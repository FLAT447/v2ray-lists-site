<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>V2Ray Configs Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- Библиотека для генерации QR-кодов -->
</head>
<body>
    <header class="header">
        <div class="header-class">
            <p class="param-header"><code>V2Ray <span class="header-gradient">Configs</span></code></p>
            <div class="social">
                <a href="https://t.me/flat447" target="_blank" rel="noopener"><i class="fa-brands fa-telegram"></i></a>
                <a href="https://youtube.com/@flat447" target="_blank" rel="noopener"><i class="fa-brands fa-youtube"></i></a>
            </div>
            <div class="divider"></div>
            <div class="github"><a style="text-decoration: none;" class="github" target="_blank" href="https://github.com/FLAT447/v2ray-lists" rel="noopener"><i class="fa-brands fa-github"></i> GitHub</a></div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Switch theme">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>
    <h1><i class="fa-solid fa-bolt"></i> V2Ray Lists</h1>
    <h3>Бесплатные конфигурации Hysteria2, ShadowSocks, VLESS, VMess, Trojan, Reality<br>Обновления каждые 3 часа</h3>
    
    <div class="controls-container">
        <div class="view-tabs">
            <button class="tab-btn active" data-view="list">
                <i class="fa-solid fa-list"></i> Списки
            </button>
            <button class="tab-btn" data-view="qr">
                <i class="fa-solid fa-qrcode"></i> QR-коды
            </button>
        </div>
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="config-search" placeholder="Поиск по ID или URL...">
            <button id="clear-search" class="clear-btn" aria-label="Очистить поиск">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="filter-group">
            <button class="filter-btn active all" data-filter="all">Все</button>
            <button class="filter-btn recommended" data-filter="recommended">Рекомендованные</button>
            <button class="filter-btn sni" data-filter="sni">Белые Списки SNI/CIDR</button>
        </div>
    </div>
    
    <div class="config-grid"></div>
    
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</body>
</html>
